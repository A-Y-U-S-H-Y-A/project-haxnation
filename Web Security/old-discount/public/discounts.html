<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discounts - DenimCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-2xl font-bold text-gray-900 hover:text-gray-700">DenimCraft</a>
                    <span class="text-sm text-gray-500">Discount Center</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
                        <i class="fas fa-arrow-left mr-1"></i>Back to Store
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Hero Section -->
        <div class="bg-gradient-to-r from-red-500 to-pink-600 rounded-2xl text-white p-8 mb-8">
            <h2 class="text-3xl font-bold mb-2">Discount Codes</h2>
            <p class="text-red-100">Check out our available discount codes (some may be expired)</p>
        </div>

        

        <!-- Discount Codes List -->
        <div class="space-y-6" id="discounts-container">
            <!-- Loading state -->
            <div id="loading" class="text-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-500 mx-auto"></div>
                <p class="mt-4 text-gray-600">Loading discount codes...</p>
            </div>
        </div>
    </main>

    <!-- Success Modal (CTF Flag) -->
    <div id="success-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 relative z-10 text-center">
            <div class="mb-6">
                <i class="fas fa-trophy text-6xl text-yellow-500 mb-4"></i>
                <h3 class="text-2xl font-bold text-green-600 mb-2">🎉 CTF Flag Captured! 🎉</h3>
                <p id="success-message" class="text-gray-700 mb-4"></p>
                <div class="bg-gray-100 p-4 rounded-lg font-mono text-lg font-bold text-blue-600" id="flag-display"></div>
            </div>
            <button id="close-success" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors">
                Awesome! 🚀
            </button>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 relative z-10 text-center">
            <div class="mb-6">
                <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
                <h3 class="text-2xl font-bold text-red-600 mb-2">Discount Application Failed</h3>
                <p id="error-message" class="text-gray-700 mb-4"></p>
            </div>
            <button id="close-error" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition-colors">
                Try Again
            </button>
        </div>
    </div>

    <script>
        let discounts = [];

        // DOM elements
        const discountsContainer = document.getElementById('discounts-container');
        const loading = document.getElementById('loading');
        const successModal = document.getElementById('success-modal');
        const errorModal = document.getElementById('error-modal');
        const successMessage = document.getElementById('success-message');
        const errorMessage = document.getElementById('error-message');
        const flagDisplay = document.getElementById('flag-display');

        // Initialize
        async function init() {
            await loadDiscounts();
            setupEventListeners();
        }

        // Load discount codes from API
        async function loadDiscounts() {
            try {
                const response = await fetch('/api/discounts');
                discounts = await response.json();
                renderDiscounts();
                loading.classList.add('hidden');
            } catch (error) {
                console.error('Failed to load discounts:', error);
                loading.innerHTML = '<p class="text-red-500">Failed to load discount codes</p>';
            }
        }

        // Render discount codes
        function renderDiscounts() {
            const currentDate = new Date();
            
            const discountsHTML = discounts.map(discount => {
                const expiryDate = new Date(discount.validUntil);
                const isExpired = expiryDate < currentDate;
                
                return `
                    <div class="bg-white rounded-xl shadow-sm border p-6 hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center space-x-3">
                                <div class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-medium">
                                    ${discount.discount}% OFF
                                </div>
                                <h3 class="text-xl font-bold text-gray-900">${discount.code}</h3>
                                ${isExpired ? '<span class="bg-red-500 text-white px-2 py-1 rounded text-xs">EXPIRED</span>' : '<span class="bg-green-500 text-white px-2 py-1 rounded text-xs">ACTIVE</span>'}
                            </div>
                        </div>
                        
                        <p class="text-gray-600 mb-4">${discount.description}</p>
                        
                        <div class="flex items-center justify-between">
                            <div class="text-sm text-gray-500">
                                <i class="fas fa-clock mr-1"></i>
                                Valid until: ${new Date(discount.validUntil).toLocaleDateString('en-US', { 
                                    year: 'numeric', 
                                    month: 'long', 
                                    day: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                })}
                            </div>
                            <button 
                                onclick="applyDiscount('${discount.code}', '${discount.validUntil}')"
                                class="${isExpired ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700'} text-white px-6 py-2 rounded-lg transition-colors font-medium"
                            >
                                ${isExpired ? 'Expired' : 'Apply Discount'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            discountsContainer.innerHTML = discountsHTML;
        }

        // Copy discount code to clipboard
        function copyDiscountCode(code) {
            navigator.clipboard.writeText(code).then(() => {
                // Show temporary success message
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                button.classList.add('bg-green-600');
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('bg-green-600');
                    button.classList.add('bg-blue-600', 'hover:bg-blue-700');
                }, 2000);
            }).catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                button.classList.add('bg-green-600');
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('bg-green-600');
                    button.classList.add('bg-blue-600', 'hover:bg-blue-700');
                }, 2000);
            });
        }

        // Setup event listeners
        function setupEventListeners() {
            // Modal close handlers
            document.getElementById('close-success').addEventListener('click', () => {
                successModal.classList.add('hidden');
                successModal.classList.remove('flex');
            });

            document.getElementById('close-error').addEventListener('click', () => {
                errorModal.classList.add('hidden');
                errorModal.classList.remove('flex');
            });

            // Escape key to close modals
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    successModal.classList.add('hidden');
                    successModal.classList.remove('flex');
                    errorModal.classList.add('hidden');
                    errorModal.classList.remove('flex');
                }
            });
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
