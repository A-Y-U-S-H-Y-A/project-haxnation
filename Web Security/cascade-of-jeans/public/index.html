<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DenimCraft - Premium Jeans Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl font-bold text-gray-900">DenimCraft</h1>
                    <span class="text-sm text-gray-500">Premium Jeans Collection</span>
                </div>
                <button id="cart-toggle" class="relative p-2 text-gray-600 hover:text-gray-900 transition-colors">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Hero Section -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl text-white p-8 mb-8">
            <h2 class="text-3xl font-bold mb-2">Premium Denim Collection</h2>
            <p class="text-blue-100">Discover our carefully curated selection of high-quality jeans</p>
        </div>

        <!-- Products Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Products will be loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-8">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-600">Loading premium jeans...</p>
        </div>
    </main>

    <!-- Shopping Cart Sidebar -->
    <div id="cart-sidebar" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black bg-opacity-50" id="cart-backdrop"></div>
        
        <!-- Sidebar -->
        <div class="absolute right-0 top-0 h-full w-96 bg-white shadow-xl transform translate-x-full transition-transform duration-300" id="cart-panel">
            <div class="flex flex-col h-full">
                <!-- Header -->
                <div class="flex items-center justify-between p-6 border-b">
                    <h3 class="text-lg font-semibold">Shopping Cart</h3>
                    <button id="close-cart" class="p-2 hover:bg-gray-100 rounded-full">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <!-- Cart Items -->
                <div class="flex-1 overflow-y-auto p-6">
                    <div id="cart-items">
                        <div class="text-center text-gray-500 py-8">
                            <i class="fas fa-shopping-cart text-4xl mb-4 opacity-50"></i>
                            <p>Your cart is empty</p>
                        </div>
                    </div>
                </div>

                <!-- Gift Cards Section -->
                <div class="border-t p-6 bg-gray-50">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Apply Gift Cards:</label>
                        <div class="flex space-x-2 mb-2">
                            <input 
                                type="text" 
                                id="gift-code-input" 
                                placeholder="Enter gift card code"
                                class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                            <button id="add-gift-code" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition-colors">
                                Add
                            </button>
                        </div>
                        <div class="text-xs text-gray-500 mb-2 hidden">
                            Available: WELCOME25, DENIM50.
                        </div>
                        <div id="applied-gift-cards" class="space-y-1">
                            <!-- Applied gift cards will appear here -->
                        </div>
                    </div>

                    <!-- Totals -->
                    <div class="space-y-2 mb-4">
                        <div class="flex justify-between items-center">
                            <span class="font-semibold">Subtotal:</span>
                            <span id="cart-subtotal" class="font-bold">₹0</span>
                        </div>
                        <div class="flex justify-between items-center text-green-600">
                            <span class="font-semibold">Gift Card Discount:</span>
                            <span id="gift-discount" class="font-bold">-₹0</span>
                        </div>
                        <div class="border-t pt-2 flex justify-between items-center">
                            <span class="font-semibold text-lg">Total:</span>
                            <span id="cart-total" class="font-bold text-xl">₹0</span>
                        </div>
                    </div>

                    <button id="checkout-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 relative z-10 text-center">
            <div class="mb-6">
                <i class="fas fa-trophy text-6xl text-yellow-500 mb-4"></i>
                <h3 class="text-2xl font-bold text-green-600 mb-2">Congratulations!</h3>
                <p id="success-message" class="text-gray-700 mb-4"></p>
                <div class="bg-gray-100 p-4 rounded-lg font-mono text-lg font-bold text-blue-600" id="flag-display"></div>
            </div>
            <button id="close-success" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                Awesome!
            </button>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 relative z-10 text-center">
            <div class="mb-6">
                <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
                <h3 class="text-2xl font-bold text-red-600 mb-2">Oops!</h3>
                <p id="error-message" class="text-gray-700 mb-4"></p>
            </div>
            <button id="close-error" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition-colors">
                Got it
            </button>
        </div>
    </div>

    <script>
        // Global state
        let products = [];
        let cart = [];
        let appliedGiftCodes = [];
        let availableGiftCards = [];

        // DOM elements
        const productsGrid = document.querySelector('.grid');
        const loading = document.getElementById('loading');
        const cartSidebar = document.getElementById('cart-sidebar');
        const cartPanel = document.getElementById('cart-panel');
        const cartToggle = document.getElementById('cart-toggle');
        const closeCart = document.getElementById('close-cart');
        const cartBackdrop = document.getElementById('cart-backdrop');
        const cartItems = document.getElementById('cart-items');
        const cartSubtotal = document.getElementById('cart-subtotal');
        const cartTotal = document.getElementById('cart-total');
        const cartCount = document.getElementById('cart-count');
        const checkoutBtn = document.getElementById('checkout-btn');

        // Gift card elements
        const giftCodeInput = document.getElementById('gift-code-input');
        const addGiftCodeBtn = document.getElementById('add-gift-code');
        const appliedGiftCardsDiv = document.getElementById('applied-gift-cards');
        const giftDiscount = document.getElementById('gift-discount');

        // Modal elements
        const successModal = document.getElementById('success-modal');
        const errorModal = document.getElementById('error-modal');
        const successMessage = document.getElementById('success-message');
        const errorMessage = document.getElementById('error-message');
        const flagDisplay = document.getElementById('flag-display');

        // Initialize app
        async function init() {
            await loadProducts();
            await loadGiftCards();
            setupEventListeners();
        }

        // Load products from API
        async function loadProducts() {
            try {
                const response = await fetch('/api/items');
                products = await response.json();
                renderProducts();
                loading.classList.add('hidden');
            } catch (error) {
                console.error('Failed to load products:', error);
                loading.innerHTML = '<p class="text-red-500">Failed to load products</p>';
            }
        }

        // Load available gift cards
        async function loadGiftCards() {
            try {
                const response = await fetch('/api/gift-cards');
                availableGiftCards = await response.json();
            } catch (error) {
                console.error('Failed to load gift cards:', error);
            }
        }

        // Render products grid
        function renderProducts() {
            const productsHTML = products.map(product => `
                <div class="bg-white rounded-xl shadow-sm border hover:shadow-md transition-shadow">
                    <div class="aspect-w-3 aspect-h-4 rounded-t-xl overflow-hidden">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-64 object-cover">
                    </div>
                    <div class="p-6">
                        <h3 class="font-semibold text-gray-900 mb-2">${product.name}</h3>
                        <p class="text-sm text-gray-600 mb-4">${product.description}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-2xl font-bold text-blue-600">₹${product.price}</span>
                            <button onclick="addToCart(${product.id})" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            productsGrid.innerHTML = productsHTML;
        }

        // Add item to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) {
                fetchAndAddToCart(productId);
                return;
            }

            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                });
            }

            updateCartUI();
            showCartSidebar();
        }

        // Fetch hidden product and add to cart
        async function fetchAndAddToCart(productId) {
            try {
                const response = await fetch(`/api/items/${productId}`);
                if (response.ok) {
                    const product = await response.json();
                    const existingItem = cart.find(item => item.id === productId);
                    
                    if (existingItem) {
                        existingItem.quantity += 1;
                    } else {
                        cart.push({
                            id: productId,
                            name: product.name,
                            price: product.price,
                            quantity: 1
                        });
                    }

                    updateCartUI();
                    showCartSidebar();
                } else {
                    console.error('Product not found');
                }
            } catch (error) {
                console.error('Failed to fetch product:', error);
            }
        }

        // Add gift card
        function addGiftCard() {
            const code = giftCodeInput.value.trim().toUpperCase();
            if (!code) return;

            // Check if code exists
            const giftCard = availableGiftCards.find(gc => gc.code === code);
            if (!giftCard) {
                showError('Invalid gift card code!');
                return;
            }

            // DUPLICATE CHECK
            if (appliedGiftCodes.includes(code)) {
                showError('Gift card code already applied!');
                return;
            }

            // Add the code
            appliedGiftCodes.push(code);
            giftCodeInput.value = '';
            updateCartUI();
        }

        // Remove gift card
        function removeGiftCard(code) {
            appliedGiftCodes = appliedGiftCodes.filter(c => c !== code);
            updateCartUI();
        }

        // Update cart UI
        function updateCartUI() {
            // Update cart count
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (totalItems > 0) {
                cartCount.textContent = totalItems;
                cartCount.classList.remove('hidden');
            } else {
                cartCount.classList.add('hidden');
                
            }

            // Update cart items
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-shopping-cart text-4xl mb-4 opacity-50"></i>
                        <p>Your cart is empty</p>
                    </div>
                `;
                cartSubtotal.textContent = '₹0';
                cartTotal.textContent = '₹0';
                giftDiscount.textContent = '-₹0';
                // checkoutBtn.disabled = true;
                return;
            }

            const cartHTML = cart.map(item => `
                <div class="flex items-center space-x-4 py-4 border-b">
                    <div class="flex-1">
                        <h4 class="font-medium">${item.name}</h4>
                        <p class="text-sm text-gray-600">₹${item.price} each</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="updateQuantity(${item.id}, -1)" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center">
                            <i class="fas fa-minus text-xs"></i>
                        </button>
                        <span class="w-8 text-center">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, 1)" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-700 p-2">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');

            cartItems.innerHTML = cartHTML;

            // Calculate totals
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const giftCardDiscount = appliedGiftCodes.reduce((sum, code) => {
                const giftCard = availableGiftCards.find(gc => gc.code === code);
                return sum + (giftCard ? giftCard.value : 0);
            }, 0);
            const total = Math.max(0, subtotal - giftCardDiscount);

            cartSubtotal.textContent = `₹${subtotal}`;
            giftDiscount.textContent = `-₹${giftCardDiscount}`;
            cartTotal.textContent = `₹${total}`;

            // Update applied gift cards display
            const appliedHTML = appliedGiftCodes.map(code => {
                const giftCard = availableGiftCards.find(gc => gc.code === code);
                const value = giftCard ? giftCard.value : 0;
                return `
                    <div class="flex items-center justify-between bg-green-50 px-3 py-2 rounded text-sm">
                        <span class="text-green-800">${code} (-₹${value})</span>
                        <button onclick="removeGiftCard('${code}')" class="text-red-500 hover:text-red-700">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
            }).join('');

            appliedGiftCardsDiv.innerHTML = appliedHTML;

            // Enable checkout only if total is 0 (fully covered by gift cards) or no gift cards applied
            // checkoutBtn.disabled = total > 0 && appliedGiftCodes.length > 0;
        }

        // Update item quantity
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                }
            }
        }

        // Remove item from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        // Show/Hide functions
        function showCartSidebar() {
            cartSidebar.classList.remove('hidden');
            setTimeout(() => cartPanel.classList.remove('translate-x-full'), 10);
        }

        function hideCartSidebar() {
            cartPanel.classList.add('translate-x-full');
            setTimeout(() => cartSidebar.classList.add('hidden'), 300);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorModal.classList.remove('hidden');
            errorModal.classList.add('flex');
        }

        function hideError() {
            errorModal.classList.add('hidden');
            errorModal.classList.remove('flex');
        }

        function hideSuccess() {
            successModal.classList.add('hidden');
            successModal.classList.remove('flex');
        }

        // Checkout
        async function checkout() {
            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        cartItems: cart,
                        giftCodes: appliedGiftCodes
                    })
                });

                const result = await response.json();

                if (result.success) {
                    if (result.flag) {
                        // Show flag success modal
                        successMessage.textContent = result.message;
                        flagDisplay.textContent = result.flag;
                        successModal.classList.remove('hidden');
                        successModal.classList.add('flex');
                    } else {
                        showError(result.message);
                    }
                    
                    if (result.orderCompleted) {
                        hideCartSidebar();
                        cart = [];
                        appliedGiftCodes = [];
                        updateCartUI();
                    }
                } else {
                    showError(result.message);
                }
            } catch (error) {
                showError('Something went wrong. Please try again.');
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            cartToggle.addEventListener('click', showCartSidebar);
            closeCart.addEventListener('click', hideCartSidebar);
            cartBackdrop.addEventListener('click', hideCartSidebar);
            checkoutBtn.addEventListener('click', checkout);

            // Gift card functionality
            addGiftCodeBtn.addEventListener('click', addGiftCard);
            giftCodeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addGiftCard();
                }
            });

            // Modal close handlers
            document.getElementById('close-success').addEventListener('click', hideSuccess);
            document.getElementById('close-error').addEventListener('click', hideError);

            // Escape key to close modals/sidebar
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    hideCartSidebar();
                    hideSuccess();
                    hideError();
                }
            });
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
